<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BATTLEGATOR</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <header>
    <h1>BATTLEGATOR</h1>
    <p id="status-msg">Connecting...</p>
  </header>


  <div id="placement-section" style="display:none">

    <p class="placement-instructions">place your gators on the board!</p>

    <div id="ship-selector"></div>

    <div class="placement-controls">
  <button onclick="resetPlacement()">↩ Reset</button>
</div>

    <div id="placement-board" class="board"></div>

    <button id="ready-btn" onclick="readyUp()" disabled>READY FOR BATTLE RN</button>

  </div>


  <div id="battle-section" style="display:none">
    <main>
      <section class="board-section">
  <h2>Your GatorWaters</h2>
  <div id="player-board" class="board"></div>
</section>
<section class="board-section">
  <h2>Enemy GatorWaters</h2>
  <div id="enemy-board" class="board"></div>
</section>
    </main>
    <div id="legend">
      <span class="legend-item miss">● Miss</span>
      <span class="legend-item hit">● Hit</span>
      <span class="legend-item ship">■ Your Gator</span>
    </div>
  </div>
<div id="gameover-overlay" style="display:none">
  <div id="gameover-box">
    <h2 id="gameover-title">GAME OVER</h2>
    <p id="gameover-msg"></p>
    <button onclick="location.reload()">PLAY AGAIN??? YOU WANT TO SO BAD</button>
  </div>
</div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
</body>
</html>
